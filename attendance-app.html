<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6uu_6jHgqNTg2NSFGKyIqf_y90aPLysm0xpCCVnCi0Xk4wWC-zQdfYTGIFhDnjKvYHA/exec';

const COLORS = [
  {bg:'#eeedfe',c:'#3c3489'},{bg:'#e1f5ee',c:'#085041'},
  {bg:'#faece7',c:'#993c1d'},{bg:'#fbeaf0',c:'#72243e'},
  {bg:'#e6f1fb',c:'#0c447c'},{bg:'#eaf3de',c:'#27500a'},
  {bg:'#faeeda',c:'#633806'}
];

let currentUser = null;
const isDemo = () => false;

// ===== API FIXED ✅ =====
async function api(action, data={}) {
  if(isDemo()) return demoHandler(action, data);

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({action, ...data})
    });

    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch(err) {
      console.log("Invalid JSON:", text);
      return {ok:false, error:'Invalid response'};
    }

  } catch(e) {
    console.log(e);
    return {ok:false, error:'Network error'};
  }
}

// باقي code same ആണ് 👇 (no change needed)

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function monthStr(offset=0) {
  const d = new Date();
  d.setMonth(d.getMonth()-offset);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function getTime() {
  return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

function initials(n) { return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

function fmtDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

// ===== LOGIN =====
async function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value.trim();
  document.getElementById('l-err').style.display = 'none';

  const res = await api('login', {username:u, password:p});

  if(res.ok) {
    currentUser = res.user;
    if(res.user.isAdmin) { showPage('page-admin'); initAdmin(); }
    else { showPage('page-staff'); initStaff(); }
  } else {
    document.getElementById('l-err').style.display = 'block';
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
  showPage('page-login');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
