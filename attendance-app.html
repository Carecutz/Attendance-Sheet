<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Carewax Attendance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060d18;--surface:#0a1525;--surface2:#0f1e30;--border:#142238;
  --text:#f0f0f0;--muted:#8a9bb0;
  --green:#1a9e60;--green-bg:#0a2518;
  --red:#e05050;--red-bg:#2a0d0d;
  --amber:#e0a020;--blue:#4a90d9;--blue-bg:#0a1830;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:480px;margin:0 auto;min-height:100vh}
.page{display:none}.page.active{display:block}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-brand{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.pad{padding:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-primary{background:#c0392b;border-color:#c0392b;color:#fff}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-block{width:100%}
.btn-danger{border-color:var(--red);color:var(--red)}
input[type=text],input[type=password],input[type=time],select{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;margin-bottom:10px;outline:none}
input:focus,select:focus{border-color:var(--blue)}
.field-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge-p{background:var(--green-bg);color:var(--green)}
.badge-a{background:var(--border);color:var(--muted)}
.badge-h{background:var(--blue-bg);color:var(--blue)}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-num{font-size:26px;font-weight:700}.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:8px;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;color:var(--muted)}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.srow{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.srow-name{font-weight:600;font-size:14px;color:var(--text)}
.srow-role{font-size:12px;color:var(--muted);margin-top:2px}
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.slot-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;background:var(--surface2)}
.slot-title{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.slot-time{font-size:14px;font-weight:700;color:var(--green);margin-bottom:6px}
.report-scroll{overflow-x:auto}
.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable th{padding:6px 4px;text-align:center;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
.rtable th:first-child{text-align:left}
.rtable td{padding:5px 4px;text-align:center;border-bottom:1px solid var(--border)}
.rtable td:first-child{text-align:left;font-weight:600;white-space:nowrap;color:var(--text)}
.rp{background:var(--green-bg);color:var(--green);border-radius:3px;font-weight:700}
.rh{background:var(--blue-bg);color:var(--blue);border-radius:3px}
.ra{color:var(--muted)}
.err{color:var(--red);font-size:12px;margin-top:-6px;margin-bottom:8px}
.loading{text-align:center;padding:28px;color:var(--muted)}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:100%;max-width:340px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px}
.sec-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}
.login-wrap{padding:40px 24px 24px;min-height:100vh;background:var(--bg)}
.login-logo{text-align:center;margin-bottom:28px}
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:14px}
.chk-row input[type=checkbox]{width:18px;height:18px;margin:0;cursor:pointer}
</style>
</head>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6uu_6jHgqNTg2NSFGKyIqf_y90aPLysm0xpCCVnCi0Xk4wWC-zQdfYTGIFhDnjKvYHA/exec";
const COLORS=[{bg:"#1a1060",c:"#a89ef0"},{bg:"#003520",c:"#50c88a"},{bg:"#3a0a00",c:"#f0856a"},{bg:"#3a0a20",c:"#f08ab0"},{bg:"#001a3a",c:"#70b0f0"},{bg:"#0a2500",c:"#80c850"},{bg:"#2a1400",c:"#d4884a"}];
let currentUser=null,editTarget=null,cache={staff:null};
window._todayRecs={};window._staffList=[];

function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function monthStr(o=0){const d=new Date();d.setMonth(d.getMonth()-o);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function getTime(){return new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true});}
function initials(n){return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
function fmtDate(d){return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function toTimeInput(t){if(!t)return"";try{const[hm,ap]=t.split(" ");let[h,m]=hm.split(":").map(Number);if(ap==="PM"&&h!==12)h+=12;if(ap==="AM"&&h===12)h=0;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");}catch(e){return"";}}
function fromTimeInput(t){if(!t)return"";const[h,m]=t.split(":").map(Number);const ap=h>=12?"PM":"AM";const h12=h%12||12;return String(h12).padStart(2,"0")+":"+String(m).padStart(2,"0")+" "+ap;}

// Local cache with TTL
const localCache={};
function setCache(key,val,ttl=30000){localCache[key]={val,exp:Date.now()+ttl};}
function getCache(key){const c=localCache[key];if(c&&c.exp>Date.now())return c.val;return null;}
function clearCache(key){delete localCache[key];}

async function api(action,data={}){
  try{
    const url=new URL(SCRIPT_URL);
    url.searchParams.append("action",action);
    Object.keys(data).forEach(k=>url.searchParams.append(k,typeof data[k]==="object"?JSON.stringify(data[k]):data[k]));
    const res=await fetch(url.toString(),{redirect:"follow"});
    const text=await res.text();
    try{return JSON.parse(text);}catch(e){return{ok:false,error:"Parse error"};}
  }catch(e){return{ok:false,error:"Network error"};}
}

async function apiCached(action,data={},ttl=30000){
  const key=action+JSON.stringify(data);
  const cached=getCache(key);
  if(cached)return cached;
  const res=await api(action,data);
  if(res.ok)setCache(key,res,ttl);
  return res;
}

async function doLogin(){
  const u=document.getElementById("l-user").value.trim();
  const p=document.getElementById("l-pass").value.trim();
  const btn=document.getElementById("login-btn");
  document.getElementById("l-err").style.display="none";
  btn.textContent="Signing in...";btn.disabled=true;
  const res=await api("login",{username:u,password:p});
  btn.textContent="Sign in";btn.disabled=false;
  if(res.ok){currentUser=res.user;cache={staff:null};if(res.user.isAdmin){showPage("page-admin");initAdmin();}else{showPage("page-staff");initStaff();}}
  else{document.getElementById("l-err").style.display="block";}
}
function doLogout(){currentUser=null;cache={};document.getElementById("l-user").value="";document.getElementById("l-pass").value="";showPage("page-login");}
function showPage(id){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");}

async function initStaff(){
  document.getElementById("s-welcome").textContent="Hello, "+currentUser.name.split(" ")[0];
  document.getElementById("s-date").textContent=fmtDate(todayStr());
  renderStaffToday();renderStaffMonth();
}
async function renderStaffToday(){
  const res=await apiCached("getTodayAtt",{},10000);
  const rec=(res.records||{})[currentUser.id]||{};
  const col=COLORS[(currentUser.id-1)%COLORS.length];
  let html=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
    <div class="avatar" style="background:${col.bg};color:${col.c}">${initials(currentUser.name)}</div>
    <div><div style="font-weight:600">${currentUser.name}</div><div style="font-size:12px;color:var(--muted)">${currentUser.role}</div></div></div>`;
  html+='<div class="slot-grid">';
  ["morning","evening"].forEach(slot=>{
    const marked=rec[slot];
    const label=slot==="morning"?"Morning In":"Evening Out";
    html+=`<div class="slot-card"><div class="slot-title">${label}</div>`;
    if(rec.absent){html+=`<span class="badge badge-a">Absent</span>`;}
    else if(marked){html+=`<div class="slot-time">${marked}</div><span class="badge badge-p">Marked</span>`;}
    else{html+=`<button class="btn btn-green btn-sm btn-block" onclick="staffMark('${slot}')">Mark now</button>`;}
    html+="</div>";
  });
  html+="</div>";
  document.getElementById("s-today").innerHTML=html;
}
async function staffMark(slot){
  // Optimistic update — show immediately
  const t=getTime();
  const cacheKey='getTodayAtt{}';
  const cached=getCache(cacheKey)||{ok:true,records:{}};
  if(!cached.records)cached.records={};
  if(!cached.records[currentUser.id])cached.records[currentUser.id]={};
  const rec=cached.records[currentUser.id];
  if(rec[slot]||rec.absent)return;
  rec[slot]=t;
  setCache(cacheKey,cached,10000);
  renderStaffToday();
  // Save in background
  api("markAtt",{date:todayStr(),uid:currentUser.id,slot,time:t}).then(r=>{
    clearCache(cacheKey);
    renderStaffMonth();
  });
}
async function renderStaffMonth(){
  const mk=monthStr();
  const res=await apiCached("getStaffMonth",{month:mk,uid:currentUser.id},60000);
  const present=res.present||0,days=res.days||0,absent=days-present;
  document.getElementById("s-month").innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">
      <div><div style="font-size:26px;font-weight:700;color:var(--green)">${present}</div><div style="font-size:12px;color:var(--muted)">Present</div></div>
      <div><div style="font-size:26px;font-weight:700;color:var(--red)">${absent}</div><div style="font-size:12px;color:var(--muted)">Absent</div></div>
      <div><div style="font-size:26px;font-weight:700">${days}</div><div style="font-size:12px;color:var(--muted)">Total days</div></div>
    </div>`;
}

async function initAdmin(){
  document.getElementById("a-date").textContent=fmtDate(todayStr());
  renderAdminToday();populateMonths();
}
function aTab(tab,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");
  ["today","report","staff"].forEach(t=>{document.getElementById("a-"+t).style.display=t===tab?"block":"none";});
  if(tab==="today")renderAdminToday();
  if(tab==="staff")renderAdminStaff();
}
async function renderAdminToday(){
  document.getElementById("a-stats").innerHTML=`<div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>`;
  const[sr,ar]=await Promise.all([
    cache.staff?Promise.resolve({ok:true,staff:cache.staff}):apiCached("getStaff",{},300000),
    apiCached("getTodayAtt",{},10000)
  ]);
  if(sr.ok)cache.staff=sr.staff;
  const staff=cache.staff||[];
  const recs=ar.records||{};
  window._todayRecs=recs;window._staffList=staff;
  let cP=0,cA=0,cH=0;
  staff.forEach(u=>{
    const r=recs[u.id]||{};
    if(r.absent)cA++;
    else if(r.morning&&r.evening)cP++;
    else if(r.morning||r.evening)cH++;
    else cA++;
  });
  document.getElementById("a-stats").innerHTML=`
    <div class="stat"><div class="stat-num" style="color:var(--green)">${cP}</div><div class="stat-label">Present</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--blue)">${cH}</div><div class="stat-label">Half Day</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--red)">${cA}</div><div class="stat-label">Absent</div></div>`;
  let html="";
  staff.forEach((u,i)=>{
    const col=COLORS[i%COLORS.length];
    const r=recs[u.id]||{};
    let bClass="badge-a",bText="Absent";
    if(!r.absent&&r.morning&&r.evening){bClass="badge-p";bText="Present";}
    else if(!r.absent&&(r.morning||r.evening)){bClass="badge-h";bText="Half Day";}
    html+=`<div class="srow">
      <div class="avatar" style="background:${col.bg};color:${col.c};width:38px;height:38px;font-size:12px">${initials(u.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="srow-name">${u.name}</div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px">
          <span class="badge ${bClass}">${bText}</span>
          ${r.morning?`<span style="font-size:11px;color:var(--muted)">AM:${r.morning}</span>`:""}
          ${r.evening?`<span style="font-size:11px;color:var(--muted)">PM:${r.evening}</span>`:""}
        </div>
        <div style="margin-top:8px">
          <button class="btn btn-sm" onclick="openEdit(${u.id})" style="font-size:12px">Edit</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("a-list").innerHTML=html;
}
function openEdit(uid){
  const u=window._staffList.find(x=>x.id==uid);
  const r=window._todayRecs[uid]||{};
  if(!u)return;
  editTarget={uid,date:todayStr()};
  document.getElementById("edit-name").textContent=u.name+" — "+fmtDate(todayStr());
  document.getElementById("edit-morning").value=toTimeInput(r.morning||"");
  document.getElementById("edit-evening").value=toTimeInput(r.evening||"");
  document.getElementById("edit-absent").checked=r.absent||false;
  document.getElementById("edit-modal").style.display="flex";
}
function closeEdit(){document.getElementById("edit-modal").style.display="none";editTarget=null;}
async function saveEdit(){
  if(!editTarget)return;
  const morning=fromTimeInput(document.getElementById("edit-morning").value);
  const evening=fromTimeInput(document.getElementById("edit-evening").value);
  const absent=document.getElementById("edit-absent").checked;
  const btn=document.querySelector("#edit-modal .btn-green");
  btn.textContent="Saving...";btn.disabled=true;
  if(absent){await api("markAbsent",{date:editTarget.date,uid:editTarget.uid});}
  else{
    if(morning)await api("markAtt",{date:editTarget.date,uid:editTarget.uid,slot:"morning",time:morning});
    if(evening)await api("markAtt",{date:editTarget.date,uid:editTarget.uid,slot:"evening",time:evening});
    if(!morning&&!evening)await api("clearAtt",{date:editTarget.date,uid:editTarget.uid});
  }
  btn.textContent="Save";btn.disabled=false;
  Object.keys(localCache).forEach(k=>{if(k.startsWith("getTodayAtt"))delete localCache[k];});closeEdit();renderAdminToday();
}

function populateMonths(){
  const sel=document.getElementById("r-month");sel.innerHTML="";
  for(let i=0;i<6;i++){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const val=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const lbl=d.toLocaleDateString("en-IN",{month:"long",year:"numeric"});
    sel.innerHTML+=`<option value="${val}">${lbl}</option>`;
  }
}
async function loadReport(){
  const mk=document.getElementById("r-month").value;
  document.getElementById("r-area").innerHTML=`<div class="loading"><div class="spinner"></div>Loading...</div>`;
  const[sr,rr]=await Promise.all([
    cache.staff?Promise.resolve({ok:true,staff:cache.staff}):apiCached("getStaff",{},300000),
    api("getMonthReport",{month:mk})
  ]);
  if(sr.ok)cache.staff=sr.staff;
  const staff=cache.staff||[];
  const recs=rr.records||{};
  const[yr,mo]=mk.split("-").map(Number);
  const dim=new Date(yr,mo,0).getDate();
  const days=[];
  for(let d=1;d<=dim;d++)days.push(yr+"-"+String(mo).padStart(2,"0")+"-"+String(d).padStart(2,"0"));
  let html=`<div class="report-scroll"><table class="rtable"><thead><tr><th>Name</th>`;
  days.forEach(d=>{
    const dd=parseInt(d.split("-")[2]);
    const isHol=new Date(d+"T00:00:00").getDay()===0;
    html+=`<th style="${isHol?"color:var(--red)":""}">${dd}</th>`;
  });
  html+="<th>P</th><th>A</th></tr></thead><tbody>";
  staff.forEach(u=>{
    html+=`<tr><td>${u.name.split(" ")[0]}</td>`;
    let tp=0,ta=0;
    days.forEach(dk=>{
      const r=(recs[dk]||{})[u.id];
      let sym="-",cls="ra";
      if(r&&r.absent){sym="A";cls="ra";ta++;}
      else if(r&&r.morning&&r.evening){sym="P";cls="rp";tp++;}
      else if(r&&(r.morning||r.evening)){sym="H";cls="rh";tp+=0.5;ta+=0.5;}
      else{ta++;}
      html+=`<td class="${cls}">${sym}</td>`;
    });
    html+=`<td style="font-weight:700;color:var(--green)">${tp}</td><td style="font-weight:700;color:var(--red)">${ta}</td></tr>`;
  });
  html+="</tbody></table></div>";
  document.getElementById("r-area").innerHTML=html;
}

async function renderAdminStaff(){
  const res=cache.staff?{ok:true,staff:cache.staff}:await api("getStaff");
  if(res.ok)cache.staff=res.staff;
  const staff=res.staff||[];
  let html="";
  staff.forEach((u,i)=>{
    const col=COLORS[i%COLORS.length];
    html+=`<div class="srow">
      <div class="avatar" style="background:${col.bg};color:${col.c};width:36px;height:36px;font-size:12px">${initials(u.name)}</div>
      <div style="flex:1">
        <div class="srow-name">${u.name}</div>
        <div style="font-size:12px;color:var(--muted)">${u.role} · @${u.username}</div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="removeStaff(${u.id})">Remove</button>
    </div>`;
  });
  document.getElementById("a-staff-list").innerHTML=html||`<div style="text-align:center;padding:20px;color:var(--muted)">No staff added</div>`;
}
async function addStaff(){
  const name=document.getElementById("ns-name").value.trim();
  const role=document.getElementById("ns-role").value.trim();
  const username=document.getElementById("ns-user").value.trim();
  const password=document.getElementById("ns-pass").value.trim();
  const err=document.getElementById("ns-err");
  if(!name||!role||!username||!password){err.textContent="All fields required";err.style.display="block";return;}
  err.style.display="none";
  const res=await api("addStaff",{name,role,username,password});
  if(!res.ok){err.textContent=res.error||"Error adding staff";err.style.display="block";return;}
  cache.staff=null;clearCache("getStaff{}");["ns-name","ns-role","ns-user","ns-pass"].forEach(id=>document.getElementById(id).value="");renderAdminStaff();
}
async function removeStaff(id){
  if(!confirm("Remove this staff member?"))return;
  await api("removeStaff",{id});
  cache.staff=null;renderAdminStaff();
}
</script>
